<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Nhạc Phụng Vụ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .loading { text-align: center; font-style: italic; color: #7f8c8d; }
        .occasion-name { font-weight: bold; font-size: 1.2em; color: #e67e22; margin-top: 20px; list-style-type: none; }
        .song-name { font-weight: 600; color: #2980b9; margin-left: 20px; margin-top: 10px; }
        .resource-item { font-weight: normal; font-style: italic; margin-left: 20px; }
        a { text-decoration: none; color: #34495e; }
        a:hover { color: #3498db; text-decoration: underline; }
        ul { list-style-type: circle; }
    </style>
</head>
<body>

    <h1>Tài Liệu Nhạc Phụng Vụ</h1>
    <div id="app" class="loading">Đang tải dữ liệu từ Google Sheets...</div>

    <script>
        // THAY ID FILE CỦA BẠN VÀO ĐÂY
        const SHEET_ID = '1pmrGKf9NVvvP-OrHXLy2COb8PaNHO3KZ4I9UUUsjXKM';
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/1`;

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const rawData = await response.json();
                
                // Cấu trúc lại dữ liệu theo nhóm
                const structuredData = {};

                rawData.forEach(row => {
                    if (!structuredData[row.DipLe]) {
                        structuredData[row.DipLe] = {};
                    }
                    if (!structuredData[row.DipLe][row.BaiHat]) {
                        structuredData[row.DipLe][row.BaiHat] = [];
                    }
                    if (row.TenTaiLieu && row.LinkTaiLieu) {
                        structuredData[row.DipLe][row.BaiHat].push({
                            name: row.TenTaiLieu,
                            link: row.LinkTaiLieu
                        });
                    }
                });

                render(structuredData);
            } catch (error) {
                document.getElementById('app').innerHTML = "Lỗi khi tải dữ liệu. Vui lòng kiểm tra lại link chia sẻ của Google Sheet.";
            }
        }

        function render(data) {
            const app = document.getElementById('app');
            app.classList.remove('loading');
            app.innerHTML = '';

            let html = '<ul>';
            for (const dipLe in data) {
                html += `<li class="occasion-name">📌 ${dipLe}<ul>`;
                for (const baiHat in data[dipLe]) {
                    html += `<li class="song-name">🎵 ${baiHat}<ul>`;
                    data[dipLe][baiHat].forEach(res => {
                        html += `<li class="resource-item"><a href="${res.link}" target="_blank">📄 ${res.name}</a></li>`;
                    });
                    html += `</ul></li>`;
                }
                html += `</ul></li>`;
            }
            html += '</ul>';
            app.innerHTML = html;
        }

        fetchData();
    </script>
</body>
</html>
